<!DOCTYPE html>

<head>

    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- GOOGLE FONT -->
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- FONT -->
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;600;700&display=swap" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

</head>
<body>

    <!-- NAVBAR -->
    <header>

        <div class="logo">Coffee Shop</div>

        <nav>

            <a href="index.html">HOME</a>

            <a href="menu.html">MENU</a>

            <a href="gallery.html">GALLERY</a>

            <a href="contact.html" class="active">CONTACT</a>

        </nav>

    </header>

    <!-- CONTACT PAGE -->
    <section class="contact-page">

        <!-- KIRI -->
        <div class="contact-left">

            <h1>Contact Us</h1>

            <p>
                Kami siap mendengar cerita, saran,
                atau reservasi dari kamu ☕
            </p>

            <!-- INFO -->
            <div class="contact-info">

                <div class="info-box">

                    <i class="fa-solid fa-location-dot"></i>

                    <span>Jln. Rambunan, Tounelet ( Sonder )</span>

                </div>

                <div class="info-box">

                    <i class="fa-solid fa-envelope"></i>

                    <span>drickscoffee@gmail.com</span>

                </div>

                <div class="info-box">

                    <i class="fa-solid fa-phone"></i>

                    <span>+62 812 3456 7890</span>

                </div>

            </div>

            <!-- SOCIAL -->
            <div class="contact-social">

                <i class="fa-brands fa-instagram"></i>

                <i class="fa-brands fa-tiktok"></i>

            </div>

        </div>

        <!-- KANAN -->
        <div class="contact-right">

            <form>

                <input type="text" placeholder="Your Name">

                <input type="email" placeholder="Your Email">

                <textarea placeholder="Your Message"></textarea>

                <button type="submit">Send Message</button>

            </form>

        </div>

    </section>

    <!-- MAP -->
    <div class="maps">
        <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3988.854404783205!2d124.77577827472446!3d1.2594742987285432!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x32876b002dd20f5b%3A0xadbd6aba60b993b0!2sDRICK&#39;S%20COFFEE!5e0!3m2!1sid!2sid!4v1779881118103!5m2!1sid!2sid" 
        width="800" 
        height="600" 
        style="border:0;" 
        allowfullscreen="" 
        loading="lazy" 
        referrerpolicy="no-referrer-when-downgrade">
        </iframe>
    </div>

    <!-- FOOTER -->
    <footer>

        <div class="footer-left">

            <div class="footer-logo">

                <img src="https://wixmp-fe53c9ff592a4da924211f23.wixmp.com/users/7eb84b99-59ce-4d04-9d93-9559a2e7375a/design-previews/9f42acfc-6132-46ae-be72-1984a041eec5/1778055281134-thumbnail.jpeg">

            <div class="footer-contact">

                📍 Jln. Rambunan, Tounelet ( Sonder ) <br>

                drickscoffee@gmail.com

            </div>

        </div>

        <div class="footer-social">

            <div class="footer-line"></div>

            <i class="fa-brands fa-instagram"></i>

            <i class="fa-brands fa-tiktok"></i>

        </div>

    </footer>

</html>
